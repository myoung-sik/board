<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상세보기</title>
</head>
<body>

<h1>글 상세보기</h1>

<!--
    Controller에서 model.addAttribute("board", board)로 전달한
    단일 게시글 데이터를 화면에 출력한다.
-->
<p>번호:
    <!-- 게시글 id 출력 -->
    <span th:text="${board.id}"></span>
</p>
<p>제목:
    <span th:text="${board.title}"></span>
</p>
<p>작성자:
    <!-- 게시글 작성자 출력 -->
    <span th:text="${board.writer}"></span>
</p>
<p>내용:
    <span th:text="${board.content}"></span>
</p>

<br>

<a th:href="@{/edit(id=${board.id})}">수정</a>
<a th:href="@{/delete(id=${board.id})}">삭제</a>
<a href="/list">목록으로</a>

</body>
</html>
