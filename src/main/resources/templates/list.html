<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 목록</title>
</head>
<body>

<h1>글 목록</h1>

<table border="1">
  <tr>
    <th>번호</th>
    <th>제목</th>
    <th>내용</th>
  </tr>

  <tr th:each="board : ${boards}">
    <td th:text="${board.id}">1</td>
    <td>
      <a th:href="@{/detail(id=${board.id})}"
         th:text="${board.title}">제목</a>
    </td>
    <td th:text="${board.content}">내용</td>
  </tr>
</table>

<br>

<a href="/write">글쓰기</a>

<br><br>

<div>
  <a th:if="${boards.hasPrevious()}"
     th:href="@{/list(page=${boards.number - 1})}">
    이전
  </a>

  <span th:text="${boards.number + 1}">1</span>
  /
  <span th:text="${boards.totalPages}">1</span>

  <a th:if="${boards.hasNext()}"
     th:href="@{/list(page=${boards.number + 1})}">
    다음
  </a>
</div>

</body>
</html>
