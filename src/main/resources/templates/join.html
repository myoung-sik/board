<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h1>회원가입</h1>

<!--
    회원가입 폼

    action="/join"
    -> 회원가입 버튼을 누르면 POST /join 요청을 보낸다.

    method="post"
    -> 회원 정보를 서버에 저장하는 작업이므로 POST 방식을 사용한다.
-->
<form action="/join" method="post">

  <!--
      name="username"

      Member Entity의 username 필드와 연결된다.
      MemberController join(Member member)에서
      자동으로 member.username에 값이 들어간다.
  -->
  아이디
  <input type="text" name="username">
  <br><br>

  <!--
      name="password"

      Member Entity password 필드와 연결된다.
      현재는 학습용으로 평문 저장하지만,
      실제 서비스에서는 반드시 암호화가 필요하다.
  -->
  비밀번호
  <input type="password" name="password">
  <br><br>

  <!--
      name="name"

      Member Entity name 필드와 연결된다.
  -->
  이름
  <input type="text" name="name">
  <br><br>

  <!-- 입력한 회원 정보를 POST /join으로 전송 -->
  <button type="submit">회원가입</button>

</form>
</body>
</html>
